dir: extra/letter_recognition
file_name: letter_recognition
extension: parquet

label_col: lettr
benign_tag: "U"  # most frequent class (813/20000); no natural "normal" class — 26 balanced letters

num_cols:
  - x_box
  - y_box
  - width
  - high
  - onpix
  - x_bar
  - y_bar
  - x2bar
  - y2bar
  - xybar
  - x2ybr
  - xy2br
  - x_ege
  - xegvy
  - y_ege
  - yegvx

cat_cols: []

train_frac: 0.8
val_frac: 0.1
test_frac: 0.1

# All 26 classes have ~590-650 train instances
min_cat_count: 100
top_n: 32
hash_buckets: 64
filter_query: null
