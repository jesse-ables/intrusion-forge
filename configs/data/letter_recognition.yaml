dir: extra/letter_recognition
file_name: letter_recognition
extension: parquet

label_col: lettr
benign_tag: "U"  # most frequent class (813/20000); no natural "normal" class — 26 balanced letters

num_cols:
  - x_box
  - y_box
  - width
  - high
  - onpix
  - x_bar
  - y_bar
  - x2bar
  - y2bar
  - xybar
  - x2ybr
  - xy2br
  - x_ege
  - xegvy
  - y_ege
  - yegvx

cat_cols: []

complexity_cols:
  - f1_min
  - f1_mean
  - f1_max
  - f2_min
  - f2_mean
  - f2_max
  - f3_min
  - f3_mean
  - f3_max
  - f4_min
  - f4_mean
  - f4_max
  - n1_min
  - n1_mean
  - n1_max
  - n2_min
  - n2_mean
  - n2_max
  - n3_min
  - n3_mean
  - n3_max
  - n4_min
  - n4_mean
  - n4_max
  - network_density_min
  - network_density_mean
  - network_density_max
  - cls_coef
  - hub
  - t2
  - t3
  - t4
  - max_dispersion
  - p95_dispersion
  - dist_to_nearest_centroid
  - p5_silhouette
  - frac_at_risk
  - is_noise_cluster
  #- cluster_class

train_frac: 0.8
val_frac: 0.1
test_frac: 0.1

# All 26 classes have ~590-650 train instances
min_cat_count: 100
top_n: 32
hash_buckets: 64
filter_query: null
