dir: dataset_v2
file_name: ton_iot_v2
extension: parquet

label_col: Attack

num_cols:
  - IN_BYTES
  - OUT_BYTES
  - IN_PKTS
  - OUT_PKTS
  - FLOW_DURATION_MILLISECONDS
  - DURATION_IN
  - DURATION_OUT
  - LONGEST_FLOW_PKT
  - SHORTEST_FLOW_PKT
  - MIN_IP_PKT_LEN
  - MAX_IP_PKT_LEN
  - SRC_TO_DST_SECOND_BYTES
  - DST_TO_SRC_SECOND_BYTES
  - SRC_TO_DST_AVG_THROUGHPUT
  - DST_TO_SRC_AVG_THROUGHPUT
  - RETRANSMITTED_IN_BYTES
  - RETRANSMITTED_IN_PKTS
  - RETRANSMITTED_OUT_BYTES
  - RETRANSMITTED_OUT_PKTS
  - NUM_PKTS_UP_TO_128_BYTES
  - NUM_PKTS_128_TO_256_BYTES
  - NUM_PKTS_256_TO_512_BYTES
  - NUM_PKTS_512_TO_1024_BYTES
  - NUM_PKTS_1024_TO_1514_BYTES
  - MIN_TTL
  - MAX_TTL
  - TCP_WIN_MAX_IN
  - TCP_WIN_MAX_OUT
  - DNS_TTL_ANSWER

cat_cols:
  - PROTOCOL
  - TCP_FLAGS
  - CLIENT_TCP_FLAGS
  - SERVER_TCP_FLAGS
  - ICMP_TYPE
  - ICMP_IPV4_TYPE
  - DNS_QUERY_TYPE
  - FTP_COMMAND_RET_CODE

complexity_cols:
  - f1_min
  - f1_mean
  - f1_max
  - f2_min
  - f2_mean
  - f2_max
  - f3_min
  - f3_mean
  - f3_max
  - f4_min
  - f4_mean
  - f4_max
  - n1_min
  - n1_mean
  - n1_max
  - n2_min
  - n2_mean
  - n2_max
  - n3_min
  - n3_mean
  - n3_max
  - n4_min
  - n4_mean
  - n4_max
  - network_density_min
  - network_density_mean
  - network_density_max
  - cls_coef
  - hub
  - t2
  - t3
  - t4
  - max_dispersion
  - p95_dispersion
  - dist_to_nearest_centroid
  - p5_silhouette
  - frac_at_risk
  - is_noise_cluster
  #- cluster_class

benign_tag: Benign

train_frac: 0.8
val_frac: 0.1
test_frac: 0.1

filter_query: null # ${data.label_col} == 'DoS' or ${data.label_col} == 'Exploits'
min_cat_count: 5000
top_n: 128
hash_buckets: 256
