# @package _global_
defaults:
  - override /model: tabular_classifier
  - override /loss: focal
  - override /loops: default
  - override /optimizer: adamw
  - override /scheduler: one_cycle

complexity:
  distance: cosine                   # euclidean | cosine — governs all complexity analysis (k-NN, MST, F/N/ND/G families)
  k: 30
  top_k_clusters: 10                 # top-K nearest adversarial clusters per cluster (vs-cluster aggregation)
  min_subsample_per_cluster: 50      # minimum samples per cluster in proportional subsampling
  max_complexity_samples: 100000     # cap on points used to build the k-NN graph

clustering:
  distance: cosine                # euclidean | cosine — L2-normalises X_num before HDBSCAN fit when cosine
  min_cluster_sizes: [10, 30, 50, 100, 150]
  min_samples_list: [5, 10, 30, 50]
  cluster_selection_method: leaf     # leaf = fine-grained cohesive clusters; eom = larger merged clusters
  max_cluster_size: null             # optional hard-cap on cluster size (null = disabled)
  max_fit_samples: 10000

analysis:
  failure_threshold: 0.0

plots:
  max_class_pairs: 10
  tsne_max_samples: 5000
  pair_tsne_max_samples: 5000

# top-level (cross-cutting)
n_samples: null
run_id: 0
stage: all
