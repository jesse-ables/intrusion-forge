distance: cosine
max_fit_samples: 10000
consensus_threshold: 0.5
algorithms:
  hdbscan:
    min_cluster_size: [10, 30, 50]
    min_samples: [5, 10, 30]
    cluster_selection_method: leaf
    max_cluster_size: null
    penalize: false
  kmeans:
    n_clusters: [16, 32, 64, 128]
  gmm:
    n_components: [16, 32, 64]
    covariance_type: full
  birch:
    threshold: [0.2, 0.3, 0.5]
    branching_factor: 50
